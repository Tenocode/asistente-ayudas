services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ayudas_db
    environment:
      POSTGRES_USER: ayudas
      POSTGRES_PASSWORD: ayudas
      POSTGRES_DB: ayudas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
