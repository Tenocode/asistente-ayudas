<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Asistente de ayudas</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #111827;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 16px;
      background: #0f766e;
      color: white;
      border-bottom: 1px solid rgba(255,255,255,0.18);
    }

    h1 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 700;
    }

    .subtitle {
      margin-top: 3px;
      font-size: 12px;
      opacity: 0.9;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 88%;
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.45;
      font-size: 14px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .bot {
      align-self: flex-start;
      background: white;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }

    .user {
      align-self: flex-end;
      color: white;
      background: #0f766e;
      border-bottom-right-radius: 4px;
    }

    .thinking {
      align-self: flex-start;
      color: #64748b;
      background: white;
      border: 1px solid #e5e7eb;
      font-style: italic;
    }

    form {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #e5e7eb;
      background: white;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      font: inherit;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
    }

    input:focus {
      border-color: #0f766e;
      box-shadow: 0 0 0 3px rgba(15,118,110,0.12);
    }

    button {
      border: 0;
      border-radius: 999px;
      background: #0f766e;
      color: white;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
    }

    button:disabled,
    input:disabled {
      opacity: 0.6;
      cursor: default;
    }

    footer {
      padding: 0 12px 10px;
      background: white;
      color: #64748b;
      font-size: 11px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <h1 id="title">Asistente de ayudas</h1>
    <div class="subtitle">Informacion orientativa con fuentes oficiales</div>
  </header>

  <main id="messages" aria-live="polite"></main>

  <form id="form">
    <input id="input" type="text" autocomplete="off" placeholder="Escribe aqui..." aria-label="Mensaje">
    <button id="send" type="submit">Enviar</button>
  </form>
  <footer>Comprueba siempre la convocatoria oficial antes de solicitar.</footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const entidad = params.get("entidad") || "Asistente de ayudas";
    const comunidad = params.get("comunidad") || "";
    const categoria = params.get("categoria") || "";

    let sessionId = null;

    const titleEl = document.getElementById("title");
    const messagesEl = document.getElementById("messages");
    const formEl = document.getElementById("form");
    const inputEl = document.getElementById("input");
    const sendEl = document.getElementById("send");

    titleEl.textContent = entidad;

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function setBusy(busy) {
      inputEl.disabled = busy;
      sendEl.disabled = busy;
    }

    async function start() {
      const qs = new URLSearchParams();
      if (entidad) qs.set("entidad", entidad);
      if (comunidad) qs.set("comunidad", comunidad);
      if (categoria) qs.set("categoria", categoria);

      try {
        const res = await fetch(`/inicio?${qs.toString()}`);
        if (!res.ok) throw new Error("inicio failed");
        const data = await res.json();
        sessionId = data.session_id;
        addMessage(data.respuesta, "bot");
        inputEl.focus();
      } catch {
        addMessage("No he podido conectar con el asistente. Intentalo de nuevo en unos minutos.", "bot");
      }
    }

    async function send(text) {
      setBusy(true);
      addMessage(text, "user");
      const thinking = addMessage("Buscando ayudas...", "thinking");

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, mensaje: text })
        });
        if (!res.ok) throw new Error("chat failed");
        const data = await res.json();
        sessionId = data.session_id;
        thinking.remove();
        addMessage(data.respuesta, "bot");
      } catch {
        thinking.textContent = "Error de conexion. Intentalo de nuevo.";
      } finally {
        setBusy(false);
        inputEl.focus();
      }
    }

    formEl.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = "";
      send(text);
    });

    start();
  </script>
</body>
</html>
